#:schema https://www.schemastore.org/prek.json

default_stages = ["pre-commit"]

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", priority = 0 },
    { id = "end-of-file-fixer", priority = 0 },
    { id = "check-toml", priority = 0 },
    { id = "check-added-large-files", args = ["--maxkb=200"], priority = 0 },
    { id = "check-merge-conflict", priority = 0 },
]

[[repos]]
repo = "local"
hooks = [
    { id = "uv-lock", name = "uv-lock", entry = "uv lock --check", language = "system", files = "^(pyproject\\.toml|uv\\.lock)$", pass_filenames = false, priority = 0 },
    { id = "ruff", name = "ruff", entry = "uv run ruff check --fix --exit-non-zero-on-fix", language = "system", types = ["python"], priority = 10 },
    { id = "ruff-format", name = "ruff-format", entry = "uv run ruff format", language = "system", types = ["python"], priority = 10 },
    { id = "bandit", name = "bandit", entry = "uv run bandit -c pyproject.toml", language = "system", types = ["python"], priority = 20 },
    { id = "detect-secrets", name = "detect-secrets", entry = "uv run detect-secrets-hook --baseline .secrets.baseline", language = "system", types = ["text"], priority = 20 },
    { id = "mypy", name = "mypy", entry = "uv run mypy src tests", language = "system", types = ["python"], require_serial = true, pass_filenames = false, fail_fast = true, priority = 40 },
    { id = "pytest", name = "pytest", entry = "uv run pytest -x", language = "system", pass_filenames = false, always_run = true, fail_fast = true, priority = 50 },
]
